# Render Blueprint — backend API (Docker, free plan). Frontend stays on Vercel.
#
# New → Blueprint → connect Sammar03/fifa-world-cup-dashboard → Render reads this
# file and prompts for every `sync: false` value (the secrets). Free web services
# sleep after 15 min idle; a no-card uptime pinger on /health keeps it awake and
# the in-process scheduler running (see docs/deploy.md §3).
services:
  - type: web
    name: fifa-world-cup-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    # Pick the region geographically closest to your Neon project to keep DB
    # latency low (oregon | ohio | virginia | frankfurt | singapore).
    region: virginia
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # Secrets — entered in the Render dashboard, never stored in the repo.
      - key: DATABASE_URL          # Neon DIRECT string: postgresql://…?sslmode=require
        sync: false
      - key: INGEST_SECRET
        sync: false
      - key: AI_API_KEY
        sync: false
      - key: FOOTBALL_DATA_API_KEY
        sync: false
      - key: CORS_ORIGINS          # the Vercel URL only (placeholder until §6)
        sync: false
      # Non-secret config — baked into the blueprint.
      - key: AI_PROVIDER
        value: groq
      - key: AI_MODEL
        value: llama-3.3-70b-versatile
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
