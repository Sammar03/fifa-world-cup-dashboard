line-length = 100
target-version = "py311"

[lint]
select = [
  "E",   # pycodestyle errors
  "F",   # pyflakes
  "I",   # isort
  "B",   # bugbear
  "UP",  # pyupgrade
  "ASYNC",
]
ignore = [
  "E501", # line length handled by formatter
  "B008", # FastAPI Depends()/Query() in defaults is the framework idiom
]

[lint.per-file-ignores]
"alembic/*" = ["I"]
