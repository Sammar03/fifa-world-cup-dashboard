<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 832" preserveAspectRatio="xMidYMid slice" width="1280" height="832">
  <!-- FIFA World Cup 2026 brand artwork: overlapping rounded "2026" color
       fields (blue / lime / green / red) with multiply blending, echoing the
       official United 2026 emblem language. Used as a darkened page backdrop. -->
  <defs>
    <clipPath id="frame"><rect width="1280" height="832"/></clipPath>
  </defs>
  <g clip-path="url(#frame)">
    <!-- full-bleed blue base -->
    <rect width="1280" height="832" fill="#3a5be0"/>

    <!-- color fields, multiply so overlaps deepen like the emblem -->
    <g style="mix-blend-mode:multiply">
      <!-- lime "2" bowl, top-left -->
      <path d="M 60,250 C 60,110 470,110 470,300 C 470,470 110,470 70,640 L 470,640"
            fill="none" stroke="#a6df1f" stroke-width="150"
            stroke-linecap="round" stroke-linejoin="round"/>

      <!-- green "0" / "O" loop, center-left -->
      <ellipse cx="470" cy="400" rx="120" ry="220"
               fill="none" stroke="#1ea53b" stroke-width="150"/>

      <!-- blue "2", center-right -->
      <path d="M 680,250 C 680,110 1090,110 1090,300 C 1090,470 730,470 690,640 L 1090,640"
            fill="none" stroke="#3a5be0" stroke-width="150"
            stroke-linecap="round" stroke-linejoin="round"/>

      <!-- red "6", far right -->
      <path d="M 1180,220 C 1060,250 1000,360 1000,480"
            fill="none" stroke="#db2a14" stroke-width="150"
            stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="1090" cy="500" r="120"
              fill="none" stroke="#db2a14" stroke-width="150"/>

      <!-- big soft color masses filling the corners -->
      <circle cx="120" cy="120" r="320" fill="#a6df1f"/>
      <circle cx="1040" cy="240" r="430" fill="#1ea53b"/>
      <rect x="780" y="-180" width="660" height="430" rx="215" fill="#db2a14"/>
      <rect x="-240" y="560" width="680" height="470" rx="235" fill="#db2a14"/>
      <circle cx="300" cy="600" r="300" fill="#3a5be0"/>
      <circle cx="640" cy="860" r="360" fill="#a6df1f"/>
    </g>
  </g>
</svg>
